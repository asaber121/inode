name: Build, Push and Update GitOps

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  docker:
    # Don't run on commits made by the workflow itself
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GHCR_PAT }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/asaber121/inode:${{ github.sha }}
            ghcr.io/asaber121/inode:latest

      - name: Update deployment on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd ~/inode

            sed -i "s|image: ghcr.io/asaber121/inode:.*|image: ghcr.io/asaber121/inode:${{ github.sha }}|" k8s/app/deployment.yaml

            echo "===== Updated Manifest ====="
            cat k8s/app/deployment.yaml

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add k8s/app/deployment.yaml

            git diff --cached --quiet && exit 0

            git commit -m "chore: update image to ${{ github.sha }} [skip ci]"

            git push origin main
