name: Build, Push and Update GitOps

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  docker:
    # Prevent the workflow from running on the commit made by itself
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GHCR_PAT }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/asaber121/inode:${{ github.sha }}

      - name: Update Kubernetes Deployment
        run: |
          sed -i "s|image: ghcr.io/asaber121/inode:.*|image: ghcr.io/asaber121/inode:${{ github.sha }}|" k8s/app/deployment.yaml

      - name: Show Updated Deployment
        run: |
          cat k8s/app/deployment.yaml

      - name: Commit Updated Manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/app/deployment.yaml

          git diff --cached --quiet && exit 0

          git commit -m "chore: update image to ${{ github.sha }} [skip ci]"

          git push
