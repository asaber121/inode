name: Build and Push

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: {{ github.actor }}
          password: {{ secrets.GHCR_PAT }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/asaber121/inode

      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/asaber121/inode:latest
            ghcr.io/asaber/inode:${{ github.sha }}
